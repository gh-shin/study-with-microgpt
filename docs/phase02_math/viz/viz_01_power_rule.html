<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다항식 미분 (Power Rule) 체험</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background-color: #f9fafb; color: #1f2937; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin-top: 0; color: #111827; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; }
        input[type=range] { width: 100%; }
        .math-box { background: #f3f4f6; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 1.1rem; margin-bottom: 20px; }
        canvas { width: 100%; height: 400px; border: 1px solid #e5e7eb; border-radius: 8px; background: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>다항식 미분 (Power Rule) 체험</h1>
        <p>함수 <code>f(x) = xⁿ</code> 의 그래프와, 특정 점 <code>x</code> 에서의 기울기(미분값)를 확인해보세요.</p>
        
        <div class="controls">
            <div class="control-group">
                <label>차수 (n): <span id="n-val">2</span></label>
                <input type="range" id="n-slider" min="1" max="5" step="1" value="2">
            </div>
            <div class="control-group">
                <label>현재 위치 (x): <span id="x-val">1.0</span></label>
                <input type="range" id="x-slider" min="-3" max="3" step="0.1" value="1">
            </div>
        </div>

        <div class="math-box">
            <strong>[계산 수식]</strong><br>
            f(x) = x<sup><span id="eq-n">2</span></sup><br>
            f(<span id="eq-x">1.0</span>) = <span id="res-f">1.000</span><br><br>
            f'(x) = <span id="eq-n2">2</span> × x<sup><span id="eq-n-1">1</span></sup><br>
            f'(<span id="eq-x2">1.0</span>) = <span id="res-df">2.000</span> <span style="color:#ef4444">(현재 점에서의 접선 기울기)</span>
        </div>

        <canvas id="graphCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = 400 * 2;
            ctx.scale(2, 2);
            draw();
        }

        const nSlider = document.getElementById('n-slider');
        const xSlider = document.getElementById('x-slider');
        
        function updateUI() {
            document.getElementById('n-val').innerText = nSlider.value;
            document.getElementById('x-val').innerText = parseFloat(xSlider.value).toFixed(1);
            
            let n = parseInt(nSlider.value);
            let x = parseFloat(xSlider.value);
            
            let f = Math.pow(x, n);
            let df = n * Math.pow(x, n - 1);
            
            document.getElementById('eq-n').innerText = n;
            document.getElementById('eq-x').innerText = x.toFixed(1);
            document.getElementById('res-f').innerText = f.toFixed(3);
            
            document.getElementById('eq-n2').innerText = n;
            document.getElementById('eq-n-1').innerText = n - 1;
            document.getElementById('eq-x2').innerText = x.toFixed(1);
            document.getElementById('res-df').innerText = df.toFixed(3);
            
            draw();
        }

        function draw() {
            const width = canvas.width / 2;
            const height = canvas.height / 2;
            
            ctx.clearRect(0, 0, width, height);
            
            const xMin = -4, xMax = 4;
            const yMin = -20, yMax = 20;
            
            function toScreen(x, y) {
                return {
                    sx: (x - xMin) / (xMax - xMin) * width,
                    sy: height - (y - yMin) / (yMax - yMin) * height
                };
            }
            
            // Grid and axes
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            ctx.beginPath();
            const origin = toScreen(0, 0);
            ctx.moveTo(origin.sx, 0); ctx.lineTo(origin.sx, height);
            ctx.moveTo(0, origin.sy); ctx.lineTo(width, origin.sy);
            ctx.stroke();
            
            let n = parseInt(nSlider.value);
            let currentX = parseFloat(xSlider.value);
            let currentY = Math.pow(currentX, n);
            let df = n * Math.pow(currentX, n - 1);
            
            // Function curve
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let px = 0; px <= width; px += 2) {
                let x = xMin + (px / width) * (xMax - xMin);
                let y = Math.pow(x, n);
                let pt = toScreen(x, y);
                if (px === 0) ctx.moveTo(pt.sx, pt.sy);
                else ctx.lineTo(pt.sx, pt.sy);
            }
            ctx.stroke();
            
            // Tangent line
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            let tX1 = xMin;
            let tY1 = df * (tX1 - currentX) + currentY;
            let p1 = toScreen(tX1, tY1);
            
            let tX2 = xMax;
            let tY2 = df * (tX2 - currentX) + currentY;
            let p2 = toScreen(tX2, tY2);
            
            ctx.moveTo(p1.sx, p1.sy);
            ctx.lineTo(p2.sx, p2.sy);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Highlight point
            let cpt = toScreen(currentX, currentY);
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(cpt.sx, cpt.sy, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        window.addEventListener('resize', resizeCanvas);
        nSlider.addEventListener('input', updateUI);
        xSlider.addEventListener('input', updateUI);
        
        setTimeout(() => { resizeCanvas(); updateUI(); }, 100);
    </script>
</body>
</html>
